<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Card Designing</title>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-blue-200 via-sky-100 to-indigo-200 flex items-center justify-center p-6">

    <div
        class="max-w-sm w-full bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden border border-white/50">

        <div class="h-20 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

        <div class="px-6 pb-6 relative">
            <div class="w-24 h-24 rounded-full border-4 border-white shadow-lg overflow-hidden mx-auto -mt-12 bg-white">
                <img src="885bc948-8b42-477e-af93-c42b08306e7f.png" alt="Profile" class="w-40 h-40 object-cover">
            </div>

            <div class="text-center mt-4">
                <h1 class="text-2xl font-bold text-gray-800">Roshan Kumar</h1>
                <p class="text-sm text-gray-500 mt-1 font-bold">Web Developer</p>
            </div>

            <p class="text-center text-gray-600 mt-4 text-sm leading-6">
                Passionate about creating beautiful and user-friendly web interfaces with HTML, CSS, JavaScript, and
                Tailwind CSS.
            </p>

            <div class="flex justify-center gap-3 mt-6">
                <button
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full font-medium shadow-md transition">
                    Follow
                </button>
                <button
                    class="bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 px-5 py-2 rounded-full font-medium transition">
                    Message
                </button>
            </div>
        </div>

    </div>

</body>
